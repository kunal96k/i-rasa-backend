spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  application:
    name: rasa

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.perfume.rasa: INFO
    org.springframework.web: INFO

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://13.232.62.157:3000,http://13.232.62.157:4173,*}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}

  upload:
    storage-dir: upload
    vehicle-documents:
      max-file-size-bytes: 5242880

  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
    name: ${ADMIN_NAME:System Admin}
    email: ${ADMIN_EMAIL:admin@rasa.com}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
